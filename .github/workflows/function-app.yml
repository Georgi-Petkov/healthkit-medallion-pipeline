name: healthkit-ingest-func

on:
  push:
    branches: [main]
    paths:
      - 'healthkit-ingest-func/**'
      - '.github/workflows/function-app.yml'
  pull_request:
    paths:
      - 'healthkit-ingest-func/**'
      - '.github/workflows/function-app.yml'

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: healthkit-ingest-func

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Azure login (OIDC, no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy to Azure Functions
        run: func azure functionapp publish healthkit-ingest-func --python
