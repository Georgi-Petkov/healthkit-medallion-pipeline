version: 2

models:
  - name: fct_daily_activity_summary
    description: One row per calendar day with key activity/vitals metrics pivoted into columns.
    columns:
      - name: metric_date
        description: Calendar day.
        tests:
          - not_null
          - unique
      - name: total_steps
        description: Total step count for the day.
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 60000
      - name: active_energy_kcal
        description: Active (non-basal) energy burned for the day, in kcal.
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 6000
      - name: exercise_minutes
        description: Apple "exercise" minutes for the day.
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 600
      - name: stand_minutes
        description: Total minutes standing for the day.
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 1440
      - name: flights_climbed
        description: Flights of stairs climbed for the day.
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 300
      - name: distance_km
        description: Walking/running distance for the day, in km.
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 200
      - name: avg_heart_rate_bpm
        description: Average heart rate for the day, in bpm.
        tests:
          - within_range:
              arguments:
                min_value: 30
                max_value: 220
      - name: resting_heart_rate_bpm
        description: Resting heart rate for the day, in bpm.
        tests:
          - within_range:
              arguments:
                min_value: 30
                max_value: 120
      - name: avg_hrv_ms
        description: Average heart rate variability for the day, in ms (SDNN).
        tests:
          - within_range:
              arguments:
                min_value: 0
                max_value: 300
      - name: weight_kg
        description: Body weight for the day, in kg.
        tests:
          - within_range:
              arguments:
                min_value: 20
                max_value: 300
      - name: metrics_present
        description: Count of distinct metric types with at least one datapoint that day.
        tests:
          - not_null

  - name: fct_weekly_trends
    description: Week-over-week activity trend, with absolute and percent change vs. the prior week.
    columns:
      - name: week_start
        description: Start of the ISO week (Monday).
        tests:
          - not_null
          - unique
      - name: total_steps
        description: Sum of daily total_steps across the week.
      - name: active_energy_kcal
        description: Sum of daily active_energy_kcal across the week.
      - name: exercise_minutes
        description: Sum of daily exercise_minutes across the week.
      - name: avg_heart_rate_bpm
        description: Average of daily avg_heart_rate_bpm across the week.
      - name: avg_resting_heart_rate_bpm
        description: Average of daily resting_heart_rate_bpm across the week.
      - name: days_with_data
        description: Count of days within the week that have at least one activity datapoint.
      - name: steps_change_vs_prev_week
        description: total_steps minus the prior week's total_steps.
      - name: steps_pct_change_vs_prev_week
        description: Percent change in total_steps vs. the prior week.
      - name: active_energy_pct_change_vs_prev_week
        description: Percent change in active_energy_kcal vs. the prior week.
      - name: resting_hr_change_vs_prev_week
        description: avg_resting_heart_rate_bpm minus the prior week's value, in bpm.

  - name: fct_weekly_weight_trends
    description: Weekly average weight & body fat (averaged over whatever real readings fall in that ISO week - no forward-fill/padding), with week-over-week change.
    columns:
      - name: year_week
        description: "ISO year-week label, e.g. 2026-W03."
        tests:
          - not_null
          - unique
      - name: week_end_date
        description: Last calendar date in the ISO week.
        tests:
          - not_null
      - name: weekly_body_fat_change_pp
        description: Change in average body fat percentage vs. the prior week, in percentage points (not percent change) - e.g. 11.5% -> 11.0% is -0.5, not -4.3%.

  - name: fct_metric_freshness
    description: Per-metric coverage and staleness, for monitoring pipeline/data health.
    columns:
      - name: metric_name
        description: HealthKit metric identifier.
        tests:
          - not_null
          - unique
      - name: days_since_last_data
        description: Days between the metric's most recent datapoint and today. Large values indicate a metric has stopped syncing.
        tests:
          - not_null
