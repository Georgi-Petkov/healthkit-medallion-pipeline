version: 2

sources:
  - name: healthkit_bronze
    database: workspace
    schema: healthkit
    tables:
      - name: bronze_health_export
        description: Raw Apple Health Auto Export JSON files, landed via Databricks Auto Loader from Google Drive. One row per exported file.
        config:
          loaded_at_field: _ingested_at
          freshness:
            warn_after: {count: 26, period: hour}
            error_after: {count: 50, period: hour}

models:
  - name: base_healthkit_metrics
    description: Bronze -> Silver. Explodes the nested Auto Export JSON (one row per exported day) into one row per (metric, reading) datapoint, using Databricks VARIANT parsing. This is the dbt-native replacement for what the original architecture's Lakeflow Declarative Pipeline did.

  - name: stg_healthkit_metrics
    description: Typed, cleaned staging model over the Silver healthkit_metrics table - one row per (metric_name, date).
    columns:
      - name: metric_name
        description: HealthKit metric identifier, e.g. heart_rate, step_count.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - heart_rate
                  - resting_heart_rate
                  - heart_rate_variability
                  - step_count
                  - active_energy
                  - apple_exercise_time
                  - apple_stand_time
                  - walking_running_distance
                  - walking_speed
                  - flights_climbed
                  - vo2_max
                  - sleep_analysis
                  - weight_body_mass
                  - body_mass_index
                  - body_fat_percentage
                  - lean_body_mass
                  - time_in_daylight
                  - cardio_recovery
                  - six_minute_walking_test_distance
                  - running_power
                  - running_speed
                  - blood_pressure
                  - waist_circumference
                  - height
      - name: metric_date
        description: Calendar date the datapoint applies to.
        tests:
          - not_null
      - name: value
        description: Best-effort single numeric value for the datapoint (coalesced from qty/avg).
