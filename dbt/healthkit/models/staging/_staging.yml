version: 2

sources:
  - name: healthkit_silver
    database: healthkit
    schema: silver
    tables:
      - name: healthkit_metrics
        description: Deduped, current-value HealthKit metric datapoints produced by the Lakeflow Bronze->Silver pipeline.
        config:
          loaded_at_field: ingested_at
          freshness:
            warn_after: {count: 26, period: hour}
            error_after: {count: 50, period: hour}

models:
  - name: stg_healthkit_metrics
    description: Typed, cleaned staging model over the Silver healthkit_metrics table - one row per (metric_name, date).
    columns:
      - name: metric_name
        description: HealthKit metric identifier, e.g. heart_rate, step_count.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - heart_rate
                  - resting_heart_rate
                  - heart_rate_variability
                  - step_count
                  - active_energy
                  - apple_exercise_time
                  - apple_stand_time
                  - walking_running_distance
                  - walking_speed
                  - flights_climbed
                  - vo2_max
                  - sleep_analysis
                  - weight_body_mass
                  - body_mass_index
                  - body_fat_percentage
                  - lean_body_mass
                  - time_in_daylight
                  - cardio_recovery
                  - six_minute_walking_test_distance
                  - running_power
                  - running_speed
                  - blood_pressure
                  - waist_circumference
                  - height
      - name: metric_date
        description: Calendar date the datapoint applies to.
        tests:
          - not_null
      - name: value
        description: Best-effort single numeric value for the datapoint (coalesced from qty/avg).
