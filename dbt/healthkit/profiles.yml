healthkit:
  target: dev
  outputs:
    dev:
      type: databricks
      catalog: workspace
      schema: healthkit_gold
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      auth_type: token
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      threads: 4
